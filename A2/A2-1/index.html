<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Assignment</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <img src="./assets/logo.png" alt="logo" />
      <div id="links">
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Blogs</a>
        <a href="#">Contact Us</a>
      </div>
      <button id="nav-button">Get Started</button>
    </nav>
    <h1>Insights & Blogs</h1>
    <div id="buttons">
        <button class="tabs">All</button>
        <button class="tabs">Tech</button>
        <button class="tabs">SaaS</button>
        <button class="tabs">Marketing</button>
    </div>

    <div id="cards">
        <div class="card">
            <img src="./assets/card1.png" alt="tech" class="card-img">
            <p id="category">Tech</p>
            <h2>The Ultimate Guide To Saas Marketing</h2>
            <p class="date">May 23, 2025</p>
        </div>
        <div class="card">
            <img src="./assets/card2.png" alt="SaaS" class="card-img">
            <p id="category">SaaS</p>
            <h2>5 Key Trends In SaaS Growth For 2025</h2>
            <p class="date">May 23, 2025</p>
        </div>
        <div class="card">
            <img src="./assets/card3.png" alt="Marketing" class="card-img">
            <p id="category">Marketing</p>
            <h2>How Data Driven Strategies Are Important</h2>
            <p class="date">May 23, 2025</p>
        </div>
    </div>

  </body>
</html>
