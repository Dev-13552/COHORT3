<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login-Fintrack Pro</title>
    <script src="auth.js"></script>
    <script>checkUser(false)</script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f3f5f7;
      }

      main {
        width: 480px;
        background: #fff;
        padding: 45px 35px;
        border-radius: 18px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      h1 {
        text-align: center;
        font-size: 2.2rem;
        margin-bottom: 10px;
        color: #111827;
      }

      main > p {
        text-align: center;
        color: #6b7280;
        font-size: 1.05rem;
        margin-bottom: 35px;
      }

      main div {
        margin-bottom: 22px;
      }

      main div p {
        font-size: 1.05rem;
        font-weight: 500;
        margin-bottom: 10px;
        color: #111827;
      }

      input {
        width: 100%;
        height: 48px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 0 15px;
        font-size: 16px;
        outline: none;
        transition: 0.25s;
      }

      input:focus {
        border-color: #16a34a;
        box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
      }

      button {
        width: 100%;
        height: 48px;
        margin-top: 8px;
        border: none;
        border-radius: 10px;
        background: #0056B3;
        color: #fff;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
      }

      button:hover {
        background: #03468e;
      }

      button:active {
        transform: scale(0.98);
      }

      button + p {
        margin-top: 24px;
        text-align: center;
        color: #374151;
        font-size: 16px;
      }

      a {
        margin-left: 5px;
        text-decoration: none;
        color: #2563eb;
        font-weight: 500;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome Back</h1>
      <p>Login to Fintrack Pro</p>

      <form action="">
        <div>
        <p>Username</p>
        <input type="text" id="user-name" required/>
      </div>
      <div>
        <p>Password</p>
        <input type="password" id="password" required />
      </div>

      <button type="submit">Login</button>
      </form>
      <p>Don't have an account?<a href="register.html">Register here</a></p>
    </main>


    <script>
        const username = document.querySelector("#user-name");
        const password = document.querySelector("#password");
        document.querySelector("form").addEventListener('submit', (e) => {
            e.preventDefault();
            const response = loginUser(username.value, password.value);

            if(response.success){
                alert(response.message);
                window.location.href = 'index.html'
            }
            else{
                alert(response.message);
            }
        })
    </script>
  </body>
</html>
