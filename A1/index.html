<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Assignment</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="container">
      <div id="left">
        <img src="./logo.png" alt="logo" id="logo" />
        <div id="inside-left">
          <h4 id="heading">POKEMON GEN I</h4>
          <h1>Pikachu</h1>
          <p>
            Pikachu is an Electric-type Pokemon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokemon.
            They are almost completely covered by yellow fur.
          </p>
          <div id="line"></div>
          <span>09/05</span>
          <img src="pokeball.png" alt="pokeball" id="pokeballImg" />
        </div>
      </div>
      <img src="pikachu.png" alt="pikachu" id="pikachu-img" />
      <div id="right">
        <div id="button">
          <div class="button-lines"></div>
          <div class="button-lines"></div>
          <div class="button-lines"></div>
        </div>
        <div id="circles">
          <div class="circle" id="black"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
          <div class="circle"></div>
        </div>
      </div>
    </div>
  </body>
</html>
